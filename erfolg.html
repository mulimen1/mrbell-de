<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Vielen Dank — Mr. Bell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --terracotta: #C2410C;
      --terracotta-dark: #a3370a;
      --terracotta-light: #fef3eb;
      --cream: #f5f5f0;
      --anthracite: #1a1a2e;
    }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: var(--cream);
      color: var(--anthracite);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Header — Mr. Bell Brand */
    header {
      width: 100%;
      border-bottom: 1px solid rgba(26, 26, 46, 0.05);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 40;
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
    }
    @media (min-width: 1024px) {
      .header-inner { padding: 1.25rem 3rem; }
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
    }
    .brand-svg { width: 36px; height: 36px; }
    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1;
    }
    .brand-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--anthracite);
    }
    .brand-tagline {
      font-size: 0.625rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: rgba(26, 26, 46, 0.5);
      font-weight: 500;
      margin-top: 0.25rem;
    }

    /* Main */
    main {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      min-height: calc(100vh - 80px);
    }
    .container {
      max-width: 580px;
      width: 100%;
      background: white;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      box-shadow: 0 8px 32px rgba(26, 26, 46, 0.08);
      text-align: center;
    }
    @media (max-width: 600px) {
      .container { padding: 2.25rem 1.5rem; }
    }

    /* Check Icon */
    .check-icon {
      width: 72px;
      height: 72px;
      background: var(--terracotta-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.25rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
      line-height: 1.15;
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.75rem; }
    }
    .lead {
      color: rgba(26, 26, 46, 0.7);
      font-size: 1.05rem;
      margin-bottom: 2rem;
    }

    .next-steps {
      background: var(--cream);
      border: 1px solid rgba(26, 26, 46, 0.08);
      border-radius: 16px;
      padding: 1.5rem;
      text-align: left;
      margin-bottom: 2rem;
    }
    .next-steps h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 0.85rem;
      font-size: 0.95rem;
    }
    .step:last-child { margin-bottom: 0; }
    .step-num {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--terracotta);
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      line-height: 1;
    }
    .step-text { color: rgba(26, 26, 46, 0.78); }
    .step-text strong { color: var(--anthracite); font-weight: 600; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.75rem;
      border-radius: 12px;
      background: var(--terracotta);
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      background: var(--terracotta-dark);
      transform: translateY(-1px);
    }
    .footer-note {
      margin-top: 1.75rem;
      font-size: 0.85rem;
      color: rgba(26, 26, 46, 0.5);
    }
    .footer-note a {
      color: var(--terracotta);
      text-decoration: none;
    }
    .footer-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- SVG Defs für die Mr. Bell Brand-Glocke (1:1 wie auf mrbell.de) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="bellGradient" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#C2410C"/>
        <stop offset="100%" stop-color="#C2410C"/>
      </linearGradient>
      <linearGradient id="bellHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#f59e6e" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#C2410C" stop-opacity="0.4"/>
      </linearGradient>
      <linearGradient id="bellBase" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#a3370a"/>
        <stop offset="100%" stop-color="#a3370a"/>
      </linearGradient>
      <symbol id="bell-icon" viewBox="0 0 100 100">
        <rect x="46" y="32" width="8" height="7" rx="1" fill="url(#bellGradient)"/>
        <circle cx="50" cy="30" r="4" fill="url(#bellGradient)"/>
        <path d="M 18 78 Q 18 38, 50 38 Q 82 38, 82 78 Z" fill="url(#bellGradient)"/>
        <ellipse cx="50" cy="52" rx="16" ry="7" fill="url(#bellHighlight)"/>
        <rect x="14" y="78" width="72" height="8" rx="3" fill="url(#bellBase)"/>
      </symbol>
    </defs>
  </svg>

  <header>
    <div class="header-inner">
      <a href="https://mrbell.de" class="brand" title="Zurück zur Startseite">
        <svg class="brand-svg" aria-hidden="true"><use href="#bell-icon"/></svg>
        <div class="brand-text">
          <span class="brand-name">Mr. Bell</span>
          <span class="brand-tagline">Service, der auffällt</span>
        </div>
      </a>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="check-icon" aria-hidden="true">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#C2410C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="5 13 9 17 19 7"/>
        </svg>
      </div>
      <h1>Vielen Dank für Ihren Kauf bei Mr. Bell</h1>
      <p class="lead" id="lead-text">
        Eine Bestätigung mit allen Details wurde an Ihre Email-Adresse gesendet.
      </p>

      <div class="next-steps">
        <h2>Nächste Schritte</h2>
        <div id="steps-container"></div>
      </div>

      <a href="https://mrbell.de" class="btn">
        Zurück zur Startseite
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/>
          <path d="M12 5l7 7-7 7"/>
        </svg>
      </a>

      <p class="footer-note">
        Fragen? Schreiben Sie uns an <a href="mailto:kontakt@mrbell.de">kontakt@mrbell.de</a>
      </p>
    </div>
  </main>

  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var plan = params.get('plan') || '';
      var stepsEl = document.getElementById('steps-container');
      var leadEl = document.getElementById('lead-text');

      function renderSteps(steps) {
        stepsEl.innerHTML = steps.map(function(s, i) {
          return '<div class="step"><div class="step-num">' + (i + 1) + '</div><div class="step-text">' + s + '</div></div>';
        }).join('');
      }

      if (plan === 'setup_only') {
        leadEl.textContent = 'Ihr Geführtes Setup ist gebucht. Sie erhalten in Kürze eine Bestätigungs-Email mit Rechnung und Termindetails.';
        renderSteps([
          '<strong>Termin-Bestätigung:</strong> Calendly-Email mit Google-Meet-Link kommt direkt an Ihre Adresse.',
          '<strong>Setup-Termin:</strong> Wir richten gemeinsam Ihren WhatsApp Business API-Zugang ein (30 Min, Video-Call).',
          '<strong>Refund-Möglichkeit:</strong> 99€ Rückerstattung möglich, wenn Sie innerhalb 30 Tagen einen Pioneer-6-Plan abschließen und die 6 Monate vollständig erfüllen.'
        ]);
      } else if (plan === 'pioneer_6' || plan === 'pioneer_3' || plan === 'standard') {
        var planLabel = plan === 'pioneer_6' ? 'Pioneer 6 Monate' : plan === 'pioneer_3' ? 'Pioneer 3 Monate' : 'Standard';
        leadEl.textContent = 'Ihr Mr. Bell ' + planLabel + ' Abo ist aktiv. Die 5-tägige Trial-Phase läuft, Sie zahlen erst nach Ablauf.';
        renderSteps([
          '<strong>Trial-Phase (5 Tage):</strong> Sie können Mr. Bell sofort testen.',
          '<strong>Bot-Aktivierung:</strong> Wir richten Ihren Bot in den nächsten Stunden ein und melden uns per Email.',
          '<strong>Rechnungen:</strong> Erhalten Sie automatisch nach jeder Abrechnung per Email.'
        ]);
      } else {
        renderSteps([
          'Sie erhalten in Kürze eine Bestätigungs-Email an Ihre angegebene Adresse.',
          'Unser Team meldet sich innerhalb von 24 Stunden mit den nächsten Schritten.'
        ]);
      }
    })();
  </script>
</body>
</html>
